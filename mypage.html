<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイページ | コドモDooo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="cities.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --accent: #f59e0b; --bg: #f8fafc;
      --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--primary); color: #fff; padding: 16px; }
    .header-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-inner a { color: #fff; text-decoration: none; font-size: .9rem; opacity: .85; }
    .header-inner a:hover { opacity: 1; }
    header h1 { font-size: 1.1rem; font-weight: 800; }
    .logout-btn { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; }
    .logout-btn:hover { background: rgba(255,255,255,.3); }

    .container { max-width: 640px; margin: 32px auto; padding: 0 16px 60px; }

    /* LOGIN */
    .login-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; }
    .login-card h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
    .login-card p { font-size: .85rem; color: var(--muted); margin-bottom: 24px; }

    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    .status-badge { display: inline-block; font-size: .8rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-left: 8px; }
    .badge-pending  { background: #fef3c7; color: #d97706; }
    .badge-approved { background: #dcfce7; color: #16a34a; }
    .badge-rejected { background: #fee2e2; color: #dc2626; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .92rem; outline: none; transition: border-color .15s; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-hint { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .checkbox-item { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-size: .85rem; transition: all .15s; }
    .checkbox-item input { width: auto; padding: 0; border: none; }
    .checkbox-item:has(input:checked) { border-color: var(--primary); background: #eff6ff; color: var(--primary); }

    .fee-row { display: flex; align-items: center; gap: 8px; }
    .fee-row input { flex: 1; }
    .fee-unit { font-size: .9rem; color: var(--muted); white-space: nowrap; }

    .save-btn { width: 100%; padding: 13px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .save-btn:hover { opacity: .9; }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }

    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    .alert { padding: 12px 16px; border-radius: 10px; font-size: .88rem; margin-bottom: 16px; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .alert-error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

    .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pending-note { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 10px; padding: 14px 16px; font-size: .88rem; color: #92400e; margin-bottom: 20px; }

    .photo-upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .15s; }
    .photo-upload-area:hover { border-color: var(--primary); }
    .photo-upload-area input[type="file"] { display: none; }
    .photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; display: none; }
    .photo-preview.show { display: block; }
    .upload-btn { display: inline-block; padding: 8px 20px; background: var(--primary); color: #fff; border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
    .upload-btn:hover { opacity: .85; }
    .upload-btn:disabled { opacity: .5; cursor: not-allowed; }
    .remove-photo-btn { display: inline-block; padding: 8px 16px; background: #f1f5f9; color: #64748b; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); margin-left: 8px; transition: opacity .15s; }
    .remove-photo-btn:hover { opacity: .85; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html">← 検索に戻る</a>
    <h1>マイページ</h1>
    <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
  </div>
</header>

<div class="container">
  <div id="loadingArea"><div class="spinner"></div></div>

  <!-- LOGIN FORM -->
  <div id="loginArea" style="display:none;">
    <div class="login-card">
      <h2>チームログイン</h2>
      <p>登録時に設定したメールアドレスとパスワードでログインしてください。</p>
      <div id="loginError" class="alert alert-error" style="display:none;"></div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="loginEmail" placeholder="team@example.com" />
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="login-btn" id="loginBtn" onclick="login()">ログイン</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardArea" style="display:none;">
    <div id="alertMsg" style="display:none;" class="alert"></div>
    <div id="pendingNote" class="pending-note" style="display:none;">
      ⏳ 現在承認待ちです。管理者が確認後に掲載されます。承認前でも情報の編集は可能です。
    </div>

    <form id="editForm">
      <div class="card">
        <div class="card-title">📋 基本情報</div>
        <div class="form-group">
          <label>チーム名</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-group">
          <label>種目</label>
          <select id="sport">
            <option>野球</option><option>サッカー</option><option>バスケットボール</option>
            <option>水泳</option><option>テニス</option><option>バレーボール</option>
            <option>バドミントン</option><option>柔道</option><option>剣道</option>
            <option>空手</option><option>合気道</option><option>レスリング</option>
            <option>ダンス</option><option>新体操</option><option>チアリーディング</option>
            <option>陸上</option><option>マラソン</option><option>トライアスロン</option>
            <option>ラグビー</option><option>アメフト</option><option>ホッケー</option>
            <option>ゴルフ</option><option>乗馬</option><option>その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>都道府県</label>
          <select id="pref">
            <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option>
            <option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option>
            <option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option>
            <option>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option>
            <option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
            <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
            <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option>
            <option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option>
            <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
            <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
            <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option>
            <option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option>
          </select>
        </div>
        <div class="form-group">
          <label>市区町村</label>
          <select id="city"><option value="">選択してください</option></select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">👦 対象・活動情報</div>
        <div class="form-group">
          <label>対象年齢（複数選択可）</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="age" value="未就学" />未就学</label>
            <label class="checkbox-item"><input type="checkbox" name="age" value="小学生" />小学生</label>
            <label class="checkbox-item"><input type="checkbox" name="age" value="中学生" />中学生</label>
          </div>
        </div>
        <div class="form-group">
          <label>活動曜日（複数選択可）</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="day" value="月" />月</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="火" />火</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="水" />水</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="木" />木</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="金" />金</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="土" />土</label>
            <label class="checkbox-item"><input type="checkbox" name="day" value="日" />日</label>
          </div>
        </div>
        <div class="form-group">
          <label>月謝</label>
          <div class="fee-row">
            <input type="number" id="feeNum" min="0" max="100000" />
            <span class="fee-unit">円 / 月</span>
          </div>
        </div>
        <div class="form-group">
          <label>体験入会</label>
          <select id="trial">
            <option value="true">体験OK</option>
            <option value="false">要相談</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📞 連絡先</div>
        <div class="form-group">
          <label>Instagram アカウント</label>
          <input type="text" id="instagram" placeholder="@なしで入力" />
        </div>
        <div class="form-group">
          <label>X（Twitter）アカウント <span style="font-weight:400;color:#64748b;">任意</span></label>
          <input type="text" id="twitter" placeholder="@なしで入力" />
        </div>
        <div class="form-group">
          <label>ウェブサイト URL <span style="font-weight:400;color:#64748b;">任意</span></label>
          <input type="url" id="website_url" placeholder="https://example.com" />
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="email" />
        </div>
      </div>

      <div class="card">
        <div class="card-title">📷 チーム写真</div>
        <img id="photoPreview" class="photo-preview" alt="チーム写真" />
        <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
          <p style="color:#64748b;font-size:.88rem;margin-bottom:12px;">クリックして写真を選択（JPG・PNG・最大5MB）</p>
          <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" onchange="previewPhoto(event)" />
          <label class="upload-btn" for="photoInput">写真を選ぶ</label>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button type="button" class="upload-btn" id="uploadPhotoBtn" onclick="uploadPhoto()" style="display:none;">アップロード</button>
          <button type="button" class="remove-photo-btn" id="removePhotoBtn" onclick="removePhoto()" style="display:none;">写真を削除</button>
        </div>
        <div id="photoMsg" style="font-size:.82rem;margin-top:8px;"></div>
      </div>

      <div class="card">
        <div class="card-title">💬 チームの紹介文</div>
        <div class="form-group">
          <textarea id="description"></textarea>
        </div>
      </div>

      <button type="submit" class="save-btn" id="saveBtn">保存する</button>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emkpkomrgknzrmxqbrvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta3Brb21yZ2tuenJteHFicnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Nzg0MTYsImV4cCI6MjA5MjU1NDQxNn0.YmtVc_0le-EDjGzv1PJHet0ShnhfFZLIYT587FzcJHQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let myTeam = null;

// 都道府県→市区町村連動
document.getElementById('pref').addEventListener('change', function() {
  const citySelect = document.getElementById('city');
  const cities = CITIES[this.value] || [];
  citySelect.innerHTML = cities.length
    ? '<option value="">選択してください</option>' + cities.map(c => `<option>${c}</option>`).join('')
    : '<option value="">選択してください</option>';
});

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

async function logout() {
  await db.auth.signOut();
}

async function loadMyTeam(userId) {
  const { data, error } = await db.from('teams').select('*').eq('user_id', userId).single();
  if (error || !data) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('loginArea').style.display = 'block';
    return;
  }
  myTeam = data;
  fillForm(data);
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('dashboardArea').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'block';
  if (data.status === 'pending') {
    document.getElementById('pendingNote').style.display = 'block';
  }
}

function fillForm(t) {
  document.getElementById('name').value = t.name;
  document.getElementById('sport').value = t.sport;
  document.getElementById('pref').value = t.pref;

  const citySelect = document.getElementById('city');
  const cities = CITIES[t.pref] || [];
  citySelect.innerHTML = cities.length
    ? '<option value="">選択してください</option>' + cities.map(c => `<option>${c}</option>`).join('')
    : '<option value="">選択してください</option>';
  citySelect.value = t.city;

  document.querySelectorAll('input[name="age"]').forEach(cb => {
    cb.checked = (t.age_groups || []).includes(cb.value);
  });
  document.querySelectorAll('input[name="day"]').forEach(cb => {
    cb.checked = (t.days || []).includes(cb.value);
  });
  document.getElementById('feeNum').value = t.fee_num;
  document.getElementById('trial').value = String(t.trial);
  document.getElementById('instagram').value = t.instagram || '';
  document.getElementById('twitter').value = t.twitter || '';
  document.getElementById('website_url').value = t.website_url || '';
  document.getElementById('email').value = t.email || '';
  document.getElementById('description').value = t.description || '';

  // 写真表示
  if (t.photo_url) {
    const preview = document.getElementById('photoPreview');
    preview.src = t.photo_url;
    preview.classList.add('show');
    document.getElementById('removePhotoBtn').style.display = 'inline-block';
  }
}

let selectedPhotoFile = null;

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    document.getElementById('photoMsg').textContent = '5MB以下の画像を選択してください。';
    document.getElementById('photoMsg').style.color = '#dc2626';
    return;
  }
  selectedPhotoFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('photoPreview');
    preview.src = e.target.result;
    preview.classList.add('show');
    document.getElementById('uploadPhotoBtn').style.display = 'inline-block';
    document.getElementById('photoMsg').textContent = '';
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto() {
  if (!selectedPhotoFile || !myTeam) return;
  const btn = document.getElementById('uploadPhotoBtn');
  btn.disabled = true;
  btn.textContent = 'アップロード中...';

  const ext = selectedPhotoFile.name.split('.').pop();
  const path = `${myTeam.user_id}/${myTeam.id}.${ext}`;

  const { error: uploadError } = await db.storage
    .from('team-photos')
    .upload(path, selectedPhotoFile, { upsert: true });

  if (uploadError) {
    document.getElementById('photoMsg').textContent = 'アップロードに失敗しました。';
    document.getElementById('photoMsg').style.color = '#dc2626';
    btn.disabled = false;
    btn.textContent = 'アップロード';
    return;
  }

  const { data } = db.storage.from('team-photos').getPublicUrl(path);
  const photoUrl = data.publicUrl;

  await db.from('teams').update({ photo_url: photoUrl }).eq('id', myTeam.id);
  myTeam.photo_url = photoUrl;

  document.getElementById('photoMsg').textContent = '写真をアップロードしました。';
  document.getElementById('photoMsg').style.color = '#16a34a';
  document.getElementById('removePhotoBtn').style.display = 'inline-block';
  btn.disabled = false;
  btn.textContent = 'アップロード';
  selectedPhotoFile = null;
}

async function removePhoto() {
  if (!myTeam || !myTeam.photo_url) return;
  if (!confirm('写真を削除しますか？')) return;

  const ext = myTeam.photo_url.split('.').pop().split('?')[0];
  const path = `${myTeam.user_id}/${myTeam.id}.${ext}`;
  await db.storage.from('team-photos').remove([path]);
  await db.from('teams').update({ photo_url: null }).eq('id', myTeam.id);
  myTeam.photo_url = null;

  const preview = document.getElementById('photoPreview');
  preview.src = '';
  preview.classList.remove('show');
  document.getElementById('removePhotoBtn').style.display = 'none';
  document.getElementById('uploadPhotoBtn').style.display = 'none';
  document.getElementById('photoMsg').textContent = '写真を削除しました。';
  document.getElementById('photoMsg').style.color = '#64748b';
}

document.getElementById('editForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const ages = [...document.querySelectorAll('input[name="age"]:checked')].map(el => el.value);
  const days = [...document.querySelectorAll('input[name="day"]:checked')].map(el => el.value);
  const feeNum = parseInt(document.getElementById('feeNum').value) || 0;

  const updates = {
    name: document.getElementById('name').value.trim(),
    sport: document.getElementById('sport').value,
    pref: document.getElementById('pref').value,
    city: document.getElementById('city').value,
    age_groups: ages,
    days: days,
    fee_num: feeNum,
    fee: `月${feeNum.toLocaleString()}円`,
    trial: document.getElementById('trial').value === 'true',
    instagram: document.getElementById('instagram').value.trim().replace(/^@/, '') || null,
    twitter: document.getElementById('twitter').value.trim().replace(/^@/, '') || null,
    website_url: document.getElementById('website_url').value.trim() || null,
    email: document.getElementById('email').value.trim() || null,
    description: document.getElementById('description').value.trim() || null,
  };

  const { error } = await db.from('teams').update(updates).eq('id', myTeam.id);
  const alertEl = document.getElementById('alertMsg');

  if (error) {
    alertEl.className = 'alert alert-error';
    alertEl.textContent = '保存に失敗しました。もう一度お試しください。';
  } else {
    alertEl.className = 'alert alert-success';
    alertEl.textContent = '保存しました。';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  alertEl.style.display = 'block';
  btn.disabled = false;
  btn.textContent = '保存する';
});

// 初期セッションチェック（リロード時の競合を防ぐ）
db.auth.getSession().then(async ({ data: { session } }) => {
  if (session) {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'block';
    await loadMyTeam(session.user.id);
  } else {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('loginArea').style.display = 'block';
  }
});

db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN') {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'block';
    await loadMyTeam(session.user.id);
  }
  if (event === 'SIGNED_OUT') {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('dashboardArea').style.display = 'none';
    document.getElementById('loginArea').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'none';
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginArea').style.display !== 'none') login();
});
</script>
