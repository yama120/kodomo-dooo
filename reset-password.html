<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード再設定 | チビスポ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; width: 100%; max-width: 400px; }
    h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
    p { font-size: .88rem; color: var(--muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; }
    .form-group input:focus { border-color: var(--primary); }
    .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .alert { padding: 12px 16px; border-radius: 10px; font-size: .88rem; margin-bottom: 16px; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
  </style>
</head>
<body>
<div class="card">
  <h1>パスワード再設定</h1>
  <p>新しいパスワードを入力してください。</p>
  <div id="msg" class="alert" style="display:none;"></div>
  <div id="formArea">
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="newPassword" placeholder="8文字以上" />
    </div>
    <div class="form-group">
      <label>パスワード確認</label>
      <input type="password" id="confirmPassword" placeholder="もう一度入力" />
    </div>
    <button class="btn" id="submitBtn" onclick="updatePassword()">パスワードを変更する</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emkpkomrgknzrmxqbrvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta3Brb21yZ2tuenJteHFicnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUzMzk4NDQsImV4cCI6MjA2MDkxNTg0NH0.sBqNXOLZVxpDiEA0gDhVBKIMJOxUk9DQIDrwTmKAppM';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

async function updatePassword() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  msgEl.style.display = 'none';

  if (newPassword.length < 8) {
    msgEl.textContent = 'パスワードは8文字以上で入力してください。';
    msgEl.className = 'alert alert-error';
    msgEl.style.display = 'block';
    return;
  }
  if (newPassword !== confirmPassword) {
    msgEl.textContent = 'パスワードが一致しません。';
    msgEl.className = 'alert alert-error';
    msgEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '変更中...';

  const { error } = await db.auth.updateUser({ password: newPassword });
  if (error) {
    msgEl.textContent = '変更に失敗しました。リンクの有効期限が切れている可能性があります。';
    msgEl.className = 'alert alert-error';
    msgEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'パスワードを変更する';
  } else {
    msgEl.textContent = 'パスワードを変更しました。マイページからログインしてください。';
    msgEl.className = 'alert alert-success';
    msgEl.style.display = 'block';
    document.getElementById('formArea').style.display = 'none';
    setTimeout(() => { location.href = 'mypage.html'; }, 3000);
  }
}
</script>
</body>
</html>
