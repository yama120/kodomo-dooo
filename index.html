<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コドモDooo | 体を動かすクラブ・チームを探そう</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="cities.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8; --accent: #f59e0b;
      --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --muted: #64748b;
      --border: #e2e8f0; --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--primary); color: #fff; padding: 20px 16px 28px; text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em; }
    header p { margin-top: 6px; font-size: .9rem; opacity: .85; }
    .header-links { margin-top: 12px; }
    .header-links a { color: #fff; font-size: .85rem; opacity: .85; text-decoration: underline; }
    .header-links a:hover { opacity: 1; }

    .search-panel { background: #fff; border-bottom: 1px solid var(--border); padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .search-row { display: flex; gap: 8px; max-width: 900px; margin: 0 auto 10px; }
    .search-row input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; }
    .search-row input:focus { border-color: var(--primary); }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; max-width: 900px; margin: 0 auto; }
    .filters select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .88rem; background: #fff; cursor: pointer; outline: none; transition: border-color .15s; }
    .filters select:focus { border-color: var(--primary); }
    .filter-reset { padding: 8px 14px; background: none; border: 1.5px solid var(--border); border-radius: 8px; font-size: .88rem; cursor: pointer; color: var(--muted); transition: all .15s; }
    .filter-reset:hover { border-color: var(--primary); color: var(--primary); }

    .result-bar { max-width: 900px; margin: 16px auto 8px; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; font-size: .88rem; color: var(--muted); }
    .result-bar select { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .85rem; background: #fff; cursor: pointer; outline: none; }

    .tab-bar { max-width: 900px; margin: 0 auto 4px; padding: 0 16px; display: flex; gap: 4px; }
    .tab-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: .85rem; cursor: pointer; color: var(--muted); font-weight: 600; transition: all .15s; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .card-grid { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .card-sport-bar { height: 6px; }
    .card-body { padding: 16px; position: relative; }
    .fav-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; line-height: 1; transition: transform .15s; }
    .fav-btn:hover { transform: scale(1.2); }
    .card-sport-badge { display: inline-block; font-size: .75rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
    .card h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; line-height: 1.3; padding-right: 28px; }
    .card-location { font-size: .82rem; color: var(--muted); margin-bottom: 10px; text-decoration: none; display: block; }
    .card-location:hover { color: var(--primary); }
    .card-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .card-meta-item { font-size: .82rem; color: var(--text); display: flex; gap: 6px; align-items: flex-start; }
    .card-meta-item .icon { font-size: .95rem; flex-shrink: 0; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
    .tag { font-size: .75rem; padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); }
    .tag.trial-ok { background: #dcfce7; border-color: #86efac; color: #16a34a; }
    .card-actions { display: flex; gap: 8px; }
    .btn { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: .82rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; display: inline-block; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }

    /* Loading / Empty */
    .loading { text-align: center; padding: 60px 16px; color: var(--muted); grid-column: 1/-1; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 16px; color: var(--muted); grid-column: 1/-1; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .95rem; }

    .register-cta { max-width: 900px; margin: 0 auto 40px; padding: 0 16px; }
    .register-cta a { display: block; background: var(--accent); color: #fff; text-align: center; padding: 14px; border-radius: var(--radius); font-weight: 700; text-decoration: none; font-size: .95rem; }
    .register-cta a:hover { opacity: .9; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); animation: modalIn .2s ease; }
    @keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-sport-bar { height: 8px; border-radius: 16px 16px 0 0; }
    .modal-body { padding: 24px; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .modal-header h2 { font-size: 1.2rem; font-weight: 800; line-height: 1.3; flex: 1; padding-right: 12px; }
    .modal-close { background: var(--bg); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--border); }
    .modal-section { margin-bottom: 20px; }
    .modal-section-title { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-info-item { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
    .modal-info-label { font-size: .75rem; color: var(--muted); margin-bottom: 2px; }
    .modal-info-value { font-size: .9rem; font-weight: 600; }
    .modal-desc { background: var(--bg); border-radius: 8px; padding: 12px; font-size: .88rem; line-height: 1.7; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .modal-actions .btn { flex: 1; padding: 12px; font-size: .9rem; min-width: 120px; }

    /* Sport colors */
    .sport-baseball{background:#ef4444}.sport-soccer{background:#22c55e}.sport-basketball{background:#f97316}
    .sport-swim{background:#06b6d4}.sport-tennis{background:#a855f7}.sport-volleyball{background:#ec4899}
    .sport-badminton{background:#84cc16}.sport-other{background:#94a3b8}
    .badge-baseball{background:#fee2e2;color:#ef4444}.badge-soccer{background:#dcfce7;color:#16a34a}
    .badge-basketball{background:#ffedd5;color:#ea580c}.badge-swim{background:#cffafe;color:#0891b2}
    .badge-tennis{background:#f3e8ff;color:#9333ea}.badge-volleyball{background:#fce7f3;color:#db2777}
    .badge-badminton{background:#f7fee7;color:#65a30d}.badge-other{background:#f1f5f9;color:#64748b}

    @media (max-width: 480px) {
      header h1 { font-size: 1.25rem; }
      .card-grid { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏃 コドモDooo</h1>
  <p>体を動かすクラブ・チームをかんたんに探せる</p>
  <div class="header-links">
    <a href="register.html">＋ チームを登録する</a>
    ／
    <a href="mypage.html">チームの方はこちら</a>

<div class="search-panel">

      <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
      <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>

</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="setTab('all')">すべて</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">

    <div class="modal-sport-bar" id="modalSportBar"></div>
    <img id="modalPhoto" src="" alt="" style="width:100%;max-height:200px;object-fit:cover;display:none;" />

      <div class="modal-section">
        <div class="modal-section-title">基本情報</div>
        <div class="modal-grid" id="modalGrid"></div>
      </div>

        <div class="modal-section-title">チームについて</div>
        <div class="modal-desc" id="modalDesc"></div>

        <div id="modalShare" style="display:flex;gap:8px;"></div>
      </div>
    </div>

<script>
const SUPABASE_URL = 'https://emkpkomrgknzrmxqbrvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta3Brb21yZ2tuenJteHFicnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Nzg0MTYsImV4cCI6MjA5MjU1NDQxNn0.YmtVc_0le-EDjGzv1PJHet0ShnhfFZLIYT587FzcJHQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const sportConfig = {
  "野球":           { cls:"baseball",   emoji:"⚾" },
  "サッカー":       { cls:"soccer",     emoji:"⚽" },
  "バスケットボール":{ cls:"basketball", emoji:"🏀" },
  "水泳":           { cls:"swim",       emoji:"🏊" },
  "テニス":         { cls:"tennis",     emoji:"🎾" },
  "バレーボール":   { cls:"volleyball", emoji:"🏐" },
  "バドミントン":   { cls:"badminton",  emoji:"🏸" },
};

let teams = [];
let currentTab = 'all';
let favorites = JSON.parse(localStorage.getItem('sf_favorites') || '[]');

function isFav(id) { return favorites.includes(id); }
function toggleFav(id, e) {
  e.stopPropagation();
  favorites = isFav(id) ? favorites.filter(f => f !== id) : [...favorites, id];
  localStorage.setItem('sf_favorites', JSON.stringify(favorites));
  applyFilters();
}

async function loadTeams() {
  const { data, error } = await db.from('teams').select('*').eq('status', 'approved').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('cardGrid').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>データの読み込みに失敗しました。<br>再度読み込んでください。</p></div>`;
    return;
  }
  teams = data.map(t => ({
    id: t.id, name: t.name, sport: t.sport, pref: t.pref, city: t.city,
    ageGroups: t.age_groups, days: t.days, feeNum: t.fee_num, fee: t.fee,
    trial: t.trial, contact: { instagram: t.instagram, email: t.email, twitter: t.twitter, website_url: t.website_url },
    description: t.description, photoUrl: t.photo_url
  }));
  applyFilters();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'all') || (i === 1 && tab === 'fav'));
  });
  applyFilters();
}

function applyFilters() {
  const q     = document.getElementById('searchInput').value.trim().toLowerCase();
  const sport = document.getElementById('filterSport').value;
  const pref  = document.getElementById('filterPref').value;
  const city  = document.getElementById('filterCity').value;
  const age   = document.getElementById('filterAge').value;
  const trial = document.getElementById('filterTrial').value;
  const sort  = document.getElementById('sortSelect').value;

  let list = teams.filter(t => {
    if (currentTab === 'fav' && !isFav(t.id)) return false;
    if (q && !t.name.toLowerCase().includes(q) && !t.city.includes(q) && !t.pref.includes(q)) return false;
    if (sport && t.sport !== sport) return false;
    if (pref  && t.pref  !== pref)  return false;
    if (city  && t.city  !== city)  return false;
    if (age   && !t.ageGroups.includes(age)) return false;
    if (trial && !t.trial) return false;
    return true;
  });
  if (sort === 'fee_asc')  list = [...list].sort((a,b) => a.feeNum - b.feeNum);
  if (sort === 'fee_desc') list = [...list].sort((a,b) => b.feeNum - a.feeNum);
  if (sort === 'name')     list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'ja'));
  renderCards(list);
}

function resetFilters() {
  ['searchInput','filterSport','filterPref','filterAge','filterTrial'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('filterCity').innerHTML = '<option value="">すべての市区町村</option>';
  document.getElementById('sortSelect').value = 'default';
  applyFilters();
}

function renderCards(list) {
  const grid = document.getElementById('cardGrid');
  document.getElementById('resultCount').textContent = `${list.length} 件`;
  grid.innerHTML = '';
  if (list.length === 0) {
    const msg = currentTab === 'fav'
      ? 'お気に入りにチームがありません。<br>カードの ⭐ を押して追加してください。'
      : '条件に合うチームが見つかりませんでした。';
    grid.innerHTML = `<div class="empty-state"><div class="icon">${currentTab === 'fav' ? '⭐' : '🔍'}</div><p>${msg}</p></div>`;
    return;
  }
  list.forEach(team => {
    const sc = sportConfig[team.sport] || { cls:"other", emoji:"🏅" };
    const fav = isFav(team.id);
    const tags = [
      ...team.days.map(d => `<span class="tag">${d}曜</span>`),
      team.trial ? '<span class="tag trial-ok">体験OK</span>' : '<span class="tag">体験要相談</span>'
    ].join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(team.id);
    card.innerHTML = `
      <div class="card-sport-bar sport-${sc.cls}"></div>
      ${team.photoUrl ? `<img src="${team.photoUrl}" alt="${team.name}" style="width:100%;height:140px;object-fit:cover;" />` : ''}
      <div class="card-body">
        <button class="fav-btn" onclick="toggleFav('${team.id}', event)">${fav ? '⭐' : '☆'}</button>
        <div class="card-sport-badge badge-${sc.cls}">${sc.emoji} ${team.sport}</div>
        <h3>${team.name}</h3>
        <a class="card-location" href="https://www.google.com/maps/search/${encodeURIComponent(team.pref+team.city)}" target="_blank" onclick="event.stopPropagation()">📍 ${team.pref} ${team.city} <span style="font-size:.75rem;color:var(--primary);">地図▶</span></a>
        <div class="card-meta">
          <div class="card-meta-item"><span class="icon">👦</span>${team.ageGroups.join(' · ')}</div>
          <div class="card-meta-item"><span class="icon">💴</span>${team.fee}</div>
        </div>
        <div class="card-tags">${tags}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          ${team.contact.instagram ? `<a class="btn btn-outline" href="https://www.instagram.com/${team.contact.instagram}" target="_blank">Instagram</a>` : ''}
          ${team.contact.email
            ? `<a class="btn btn-primary" href="mailto:${team.contact.email}">メール</a>`
            : (team.contact.instagram ? `<a class="btn btn-primary" href="https://www.instagram.com/${team.contact.instagram}" target="_blank">DM</a>` : '')}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(id) {
  const team = teams.find(t => t.id === id);
  if (!team) return;
  const sc = sportConfig[team.sport] || { cls:"other", emoji:"🏅" };
  document.getElementById('modalSportBar').className = `modal-sport-bar sport-${sc.cls}`;
  const modalPhoto = document.getElementById('modalPhoto');
  if (team.photoUrl) { modalPhoto.src = team.photoUrl; modalPhoto.style.display = 'block'; }
  else { modalPhoto.src = ''; modalPhoto.style.display = 'none'; }
  document.getElementById('modalTitle').textContent = team.name;
  document.getElementById('modalBadge').innerHTML = `<span class="card-sport-badge badge-${sc.cls}">${sc.emoji} ${team.sport}</span>`;
  document.getElementById('modalLocation').innerHTML = `📍 ${team.pref} ${team.city} <a href="https://www.google.com/maps/search/${encodeURIComponent(team.pref+team.city)}" target="_blank" style="color:var(--primary);font-size:.82rem;text-decoration:none;">地図で見る ▶</a>`;
  document.getElementById('modalGrid').innerHTML = `
    <div class="modal-info-item"><div class="modal-info-label">対象年齢</div><div class="modal-info-value">${team.ageGroups.join(' · ')}</div></div>
    <div class="modal-info-item"><div class="modal-info-label">月謝</div><div class="modal-info-value">${team.fee}</div></div>
    <div class="modal-info-item"><div class="modal-info-label">活動曜日</div><div class="modal-info-value">${team.days.join(' · ')}曜日</div></div>
    <div class="modal-info-item"><div class="modal-info-label">体験入会</div><div class="modal-info-value">${team.trial ? '✅ OK' : '要相談'}</div></div>`;
  document.getElementById('modalDesc').textContent = team.description || '説明はありません。';
  document.getElementById('modalActions').innerHTML = `
    ${team.contact.instagram ? `<a class="btn btn-outline" href="https://www.instagram.com/${team.contact.instagram}" target="_blank">Instagram</a>` : ''}
    ${team.contact.twitter ? `<a class="btn btn-outline" href="https://x.com/${team.contact.twitter}" target="_blank">X（Twitter）</a>` : ''}
    ${team.contact.website_url ? `<a class="btn btn-outline" href="${team.contact.website_url}" target="_blank">ウェブサイト</a>` : ''}
    ${team.contact.email ? `<a class="btn btn-primary" href="${makeMailto(team)}">メールで問い合わせ</a>` : (team.contact.instagram ? `<a class="btn btn-primary" href="https://www.instagram.com/${team.contact.instagram}" target="_blank">DMで問い合わせ</a>` : '')}
    <button class="btn btn-outline" onclick="toggleFavModal('${team.id}')" id="modalFavBtn">${isFav(team.id) ? '⭐ お気に入り済み' : '☆ お気に入り'}</button>`;
  // SNS共有ボタン
  const shareUrl = encodeURIComponent(location.href.split('?')[0]);
  const shareText = encodeURIComponent(`【${team.name}】${team.sport}・${team.pref}${team.city} のチームをコドモDoooで見つけました！`);
  document.getElementById('modalShare').innerHTML = `
    <a href="https://line.me/R/msg/text/?${shareText}%0a${shareUrl}" target="_blank"
       style="background:#06C755;color:#fff;font-size:.8rem;font-weight:700;padding:6px 14px;border-radius:6px;text-decoration:none;">LINE</a>
    <a href="https://x.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank"
       style="background:#000;color:#fff;font-size:.8rem;font-weight:700;padding:6px 14px;border-radius:6px;text-decoration:none;">X</a>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleFavModal(id) {
  favorites = isFav(id) ? favorites.filter(f => f !== id) : [...favorites, id];
  localStorage.setItem('sf_favorites', JSON.stringify(favorites));
  const btn = document.getElementById('modalFavBtn');
  if (btn) btn.textContent = isFav(id) ? '⭐ お気に入り済み' : '☆ お気に入り';
  applyFilters();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('searchInput').addEventListener('input', applyFilters);
['filterSport','filterAge','filterTrial'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('filterPref').addEventListener('change', function() {
  const citySelect = document.getElementById('filterCity');
  const cities = CITIES[this.value] || [];
  citySelect.innerHTML = cities.length
    ? '<option value="">すべての市区町村</option>' + cities.map(c => `<option>${c}</option>`).join('')
    : '<option value="">すべての市区町村</option>';
  applyFilters();
});
document.getElementById('filterCity').addEventListener('change', applyFilters);

function makeMailto(team) {
  const subject = encodeURIComponent(`【コドモDooo】${team.name}へのお問い合わせ`);
  const body = encodeURIComponent(
`${team.name} 担当者様

コドモDoooを見てご連絡しました。

【お名前】
【お子さんの年齢】
【ご質問・ご要望】


よろしくお願いいたします。`
  );
  return `mailto:${team.contact.email}?subject=${subject}&body=${body}`;
}

// URLパラメータでお気に入りタブを直接開く
if (new URLSearchParams(location.search).get('tab') === 'fav') setTab('fav');

loadTeams();
</script>
