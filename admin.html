<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 | チビスポ</title>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
  <script src="supabase-lite.js"></script>
  <script src="cities.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --muted: #64748b;
      --border: #e2e8f0; --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ===== LOGIN ===== */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .login-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 1.2rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .login-card p { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; }
    .form-group input:focus { border-color: var(--primary); }
    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    .login-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: .85rem; margin-bottom: 16px; display: none; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; }
    header { background: var(--primary); color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.1rem; font-weight: 800; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right a { color: #fff; font-size: .85rem; opacity: .85; text-decoration: none; }
    .header-right a:hover { opacity: 1; }
    .logout-btn { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; }
    .logout-btn:hover { background: rgba(255,255,255,.3); }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 10px; box-shadow: var(--shadow); padding: 16px 20px; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn { padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: .88rem; cursor: pointer; color: var(--muted); font-weight: 600; transition: all .15s; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* Team list */
    .team-list { display: flex; flex-direction: column; gap: 12px; }
    .team-item { background: #fff; border-radius: 10px; box-shadow: var(--shadow); padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .team-info { flex: 1; min-width: 0; }
    .team-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .team-meta { font-size: .82rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; }
    .team-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

    .badge { font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .badge-pending  { background: #fef3c7; color: #d97706; }
    .badge-approved { background: #dcfce7; color: #16a34a; }
    .badge-rejected { background: #fee2e2; color: #dc2626; }

    .btn { padding: 7px 14px; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; white-space: nowrap; }
    .btn:hover { opacity: .85; }
    .btn-approve  { background: #22c55e; color: #fff; }
    .btn-reject   { background: #ef4444; color: #fff; }
    .btn-edit     { background: var(--primary); color: #fff; }
    .btn-delete   { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; }

    /* 体験申込み */
    .section-title { font-size: 1.1rem; font-weight: 800; margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; gap: 8px; }
    .trial-list { display: flex; flex-direction: column; gap: 10px; }
    .trial-row { background: #fff; border-radius: 10px; box-shadow: var(--shadow); padding: 14px 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
    .trial-row.new { border-left: 4px solid #f97316; }
    .trial-row-main { flex: 1; min-width: 200px; }
    .trial-row-team { font-weight: 800; font-size: .95rem; margin-bottom: 4px; }
    .trial-row-meta { font-size: .78rem; color: var(--muted); }
    .trial-row-parent { font-size: .85rem; margin-top: 4px; }
    .trial-row-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .trial-badge { font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
    .trial-badge.new { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .trial-badge.contacted { background: #dbeafe; color: #1e40af; }
    .trial-badge.done { background: #dcfce7; color: #16a34a; }
    .trial-type-tag { font-size: .72rem; font-weight: 800; padding: 3px 10px; border-radius: 12px; margin-right: 6px; }
    .trial-type-tag.trial { background: #ffedd5; color: #c2410c; }
    .trial-type-tag.inquiry { background: #e0e7ff; color: #4338ca; }
    .trial-rank-item { display: flex; justify-content: space-between; padding: 8px 14px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); margin-bottom: 6px; font-size: .88rem; }

    /* Loading */
    .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Edit Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); animation: modalIn .2s ease; }
    @keyframes modalIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 1.1rem; font-weight: 800; }
    .modal-close { background: #f1f5f9; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: .9rem; }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal .form-group { margin-bottom: 14px; }
    .modal .form-group label { font-size: .82rem; }
    .modal .form-group input, .modal .form-group select, .modal .form-group textarea { font-size: .9rem; padding: 8px 12px; }
    .modal .form-group textarea { min-height: 80px; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .checkbox-item { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; font-size: .82rem; transition: all .15s; }
    .checkbox-item input { width: auto; padding: 0; border: none; }
    .checkbox-item:has(input:checked) { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
    .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; }
    .modal-footer .btn { flex: 1; padding: 10px; font-size: .9rem; }
    .btn-save { background: var(--primary); color: #fff; }
    .btn-cancel { background: #f1f5f9; color: var(--text); }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .team-item { flex-direction: column; }
      .team-actions { width: 100%; }
      .modal-grid { grid-template-columns: 1fr; }
      header { padding: 12px 14px; gap: 8px; }
      header h1 { font-size: .95rem; }
      .header-right { gap: 8px; flex-shrink: 0; }
      .header-right a { font-size: .75rem; }
      .logout-btn { padding: 5px 10px; font-size: .75rem; }
      .container { padding: 16px 12px 40px; }
      .tab-bar { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
      .tab-btn { white-space: nowrap; flex-shrink: 0; }
      .section-title { font-size: 1rem; }
      .trial-row { flex-direction: column; }
      .trial-row-actions { width: 100%; justify-content: flex-start; }
    }
    @media (max-width: 360px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>🔐 管理者ログイン</h1>
    <p>スポーツクラブ検索 管理画面</p>

      <div class="stat-card"><div class="stat-num" id="statRejected">-</div><div class="stat-label">却下</div></div>

      <button class="tab-btn" id="trialTab-done" onclick="setTrialTab('done')">完了</button>
      <button class="tab-btn" id="trialTab-trial_only" onclick="setTrialTab('trial_only')">🎉 体験のみ</button>

    <div class="section-title">🏆 クラブ別申込みランキング</div>
    <div id="trialRanking"><div class="empty">読み込み中...</div></div>

    <div class="section-title" style="margin-top:40px;">📋 チーム管理</div>

    <div class="tab-bar">

    </div>

    <div id="teamList"><div class="spinner"></div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emkpkomrgknzrmxqbrvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta3Brb21yZ2tuenJteHFicnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Nzg0MTYsImV4cCI6MjA5MjU1NDQxNn0.YmtVc_0le-EDjGzv1PJHet0ShnhfFZLIYT587FzcJHQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const FUNCTIONS_URL = 'https://emkpkomrgknzrmxqbrvx.supabase.co/functions/v1';

let currentTab = 'pending';
let allTeams = [];

// ===== AUTH =====
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  const { data: authData, error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ログイン';
    return;
  }
  // 管理者チェック
  const { data: adminRow } = await db.from('admins').select('id').eq('user_id', authData.user.id).maybeSingle();
  if (!adminRow) {
    await db.auth.signOut();
    errorEl.textContent = '管理者権限がありません。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ログイン';
    return;
  }
  showDashboard();
}

async function logout() {
  await db.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

// 初期セッションチェック
let initialized = false;
db.auth.getSession().then(async ({ data: { session } }) => {
  initialized = true;
  if (session) {
    const { data: adminRow } = await db.from('admins').select('id').eq('user_id', session.user.id).maybeSingle();
    if (adminRow) { showDashboard(); } else { await db.auth.signOut(); }
  }
});

db.auth.onAuthStateChange((event, session) => {
  if (!initialized) return;
  if (event === 'SIGNED_IN') { showDashboard(); }
  if (event === 'SIGNED_OUT') { logout(); }
});

function showDashboard() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadTeams();
  loadTrialRequests();
}

let allTrialRequests = [];
let currentTrialTab = 'all';

async function loadTrialRequests() {
  const { data, error } = await db.from('trial_requests').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('trialList').innerHTML = '<div class="empty">体験申込みの読み込みに失敗しました。</div>';
    return;
  }
  allTrialRequests = data || [];
  updateTrialStats();
  renderTrialTab();
  renderTrialRanking();
}

function updateTrialStats() {
  const trialOnly = allTrialRequests.filter(r => (r.type || 'trial') === 'trial');
  const total = trialOnly.length;
  const newCount = trialOnly.filter(r => r.status === 'new').length;
  const now = new Date();
  const thisMonth = trialOnly.filter(r => {
    const d = new Date(r.created_at);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }).length;
  document.getElementById('statTrialTotal').textContent = total;
  document.getElementById('statTrialMonth').textContent = thisMonth;
  document.getElementById('statTrialNew').textContent = newCount;
}

function setTrialTab(tab) {
  currentTrialTab = tab;
  ['all','new','contacted','done','trial_only','inquiry_only'].forEach(t => {
    const el = document.getElementById('trialTab-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  renderTrialTab();
}

function renderTrialTab() {
  let list = allTrialRequests;
  if (currentTrialTab === 'trial_only') {
    list = allTrialRequests.filter(r => (r.type || 'trial') === 'trial');
  } else if (currentTrialTab === 'inquiry_only') {
    list = allTrialRequests.filter(r => r.type === 'inquiry');
  } else if (currentTrialTab !== 'all') {
    list = allTrialRequests.filter(r => r.status === currentTrialTab);
  }
  const container = document.getElementById('trialList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">該当する申込みはありません。</div>';
    return;
  }
  const teamMap = Object.fromEntries(allTeams.map(t => [t.id, t]));
  const statusLabel = (s) => ({ new: '未対応', contacted: '対応中', done: '完了' }[s] || '未対応');
  const escaped = (s) => (s || '').replace(/[<>"']/g, c => ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  container.innerHTML = '<div class="trial-list">' + list.map(r => {
    const team = teamMap[r.team_id];
    const teamName = team ? team.name : '（削除済みチーム）';
    const isTrial = (r.type || 'trial') === 'trial';
    const typeLabel = isTrial ? '🎉 体験' : '💬 質問';
    const dateStr = new Date(r.created_at).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const childInfo = isTrial
      ? `<div class="trial-row-meta">${dateStr}｜${escaped(r.experience_level || '')}｜${r.child_age || '—'}歳・${escaped(r.child_grade || '')}</div>
         <div class="trial-row-parent">お子さま：${escaped(r.child_name || '—')}${r.child_name_kana ? `（${escaped(r.child_name_kana)}）` : ''}</div>`
      : `<div class="trial-row-meta">${dateStr}｜質問のみ</div>`;
    const messagePreview = r.message ? `<div class="trial-row-parent" style="margin-top:4px;color:#475569;">💬 ${escaped(r.message.length > 80 ? r.message.substring(0, 80) + '...' : r.message)}</div>` : '';
    return `
      <div class="trial-row ${r.status === 'new' ? 'new' : ''}">
        <div class="trial-row-main">
          <div class="trial-row-team"><span class="trial-type-tag ${isTrial ? 'trial' : 'inquiry'}">${typeLabel}</span>${escaped(teamName)}</div>
          ${childInfo}
          <div class="trial-row-parent">保護者：${escaped(r.parent_name)}（<a href="mailto:${escaped(r.parent_email)}">${escaped(r.parent_email)}</a>）</div>
          ${messagePreview}
        </div>
        <div class="trial-row-actions">
          <span class="trial-badge ${r.status}">${statusLabel(r.status)}</span>
          ${r.status === 'new' ? `<button class="btn btn-edit" onclick="adminUpdateTrialStatus('${r.id}', 'contacted')">対応中</button>` : ''}
          ${r.status !== 'done' ? `<button class="btn btn-approve" onclick="adminUpdateTrialStatus('${r.id}', 'done')">完了</button>` : ''}
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function renderTrialRanking() {
  const teamMap = Object.fromEntries(allTeams.map(t => [t.id, t]));
  const counts = {};
  allTrialRequests.forEach(r => {
    counts[r.team_id] = (counts[r.team_id] || 0) + 1;
  });
  const ranked = Object.entries(counts)
    .map(([id, count]) => ({ team: teamMap[id], count }))
    .filter(x => x.team)
    .sort((a, b) => b.count - a.count)
    .slice(0, 10);

  const container = document.getElementById('trialRanking');
  if (ranked.length === 0) {
    container.innerHTML = '<div class="empty">まだ申込みデータがありません。</div>';
    return;
  }
  const escaped = (s) => (s || '').replace(/[<>"']/g, c => ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  container.innerHTML = ranked.map((x, i) => `
    <div class="trial-rank-item">
      <span>${i + 1}位　${escaped(x.team.name)}</span>
      <strong>${x.count}件</strong>
    </div>
  `).join('');
}

async function adminUpdateTrialStatus(id, status) {
  const { error } = await db.from('trial_requests').update({ status }).eq('id', id);
  if (error) { alert('更新に失敗しました。'); return; }
  loadTrialRequests();
}

// ===== DATA =====
async function loadTeams() {
  const { data, error } = await db.from('teams').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('teamList').innerHTML = '<div class="empty">データの読み込みに失敗しました。</div>'; return; }
  allTeams = data;
  updateStats();
  renderTab();
}

function updateStats() {
  document.getElementById('statPending').textContent  = allTeams.filter(t => t.status === 'pending').length;
  document.getElementById('statApproved').textContent = allTeams.filter(t => t.status === 'approved').length;
  document.getElementById('statRejected').textContent = allTeams.filter(t => t.status === 'rejected').length;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['pending','approved','rejected'][i] === tab);
  });
  renderTab();
}

function renderTab() {
  const list = allTeams.filter(t => t.status === currentTab);
  const el = document.getElementById('teamList');
  el.innerHTML = '';
  if (list.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '該当するチームはありません。';
    el.appendChild(empty);
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'team-list';

  list.forEach(t => {
    const item = document.createElement('div');
    item.className = 'team-item';

    // info
    const info = document.createElement('div');
    info.className = 'team-info';

    const nameRow = document.createElement('div');
    nameRow.className = 'team-name';
    nameRow.textContent = t.name + ' ';
    const badge = document.createElement('span');
    badge.className = `badge badge-${t.status}`;
    badge.textContent = statusLabel(t.status);
    nameRow.appendChild(badge);

    const meta = document.createElement('div');
    meta.className = 'team-meta';
    [
      `📍 ${t.pref} ${t.city}`,
      t.sport,
      (t.age_groups||[]).join('・'),
      t.fee,
      `申請：${new Date(t.created_at).toLocaleDateString('ja-JP')}`
    ].forEach(text => {
      const span = document.createElement('span');
      span.textContent = text;
      meta.appendChild(span);
    });

    info.appendChild(nameRow);
    info.appendChild(meta);

    // actions
    const actions = document.createElement('div');
    actions.className = 'team-actions';

    if (t.status !== 'approved') {
      const btn = document.createElement('button');
      btn.className = 'btn btn-approve';
      btn.textContent = '承認';
      btn.addEventListener('click', () => updateStatus(t.id, 'approved'));
      actions.appendChild(btn);
    }
    if (t.status !== 'rejected') {
      const btn = document.createElement('button');
      btn.className = 'btn btn-reject';
      btn.textContent = '却下';
      btn.addEventListener('click', () => updateStatus(t.id, 'rejected'));
      actions.appendChild(btn);
    }
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-edit';
    editBtn.textContent = '編集';
    editBtn.addEventListener('click', () => openEditModal(t.id));
    actions.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-delete';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => deleteTeam(t.id, t.name));
    actions.appendChild(delBtn);

    item.appendChild(info);
    item.appendChild(actions);
    wrap.appendChild(item);
  });

  el.appendChild(wrap);
}

function statusLabel(s) {
  return s === 'pending' ? '承認待ち' : s === 'approved' ? '公開中' : '却下';
}

async function updateStatus(id, status) {
  const { error } = await db.from('teams').update({ status }).eq('id', id);
  if (error) { alert('更新に失敗しました。'); return; }

  // 承認時にチームへメール通知
  if (status === 'approved') {
    const team = allTeams.find(t => t.id === id);
    if (team && team.email) {
      fetch(`${FUNCTIONS_URL}/send-approve-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to_email: team.email,
          team_name: team.name,
          mypage_url: 'https://chibispo.com/mypage.html',
        }),
      }).catch(() => {});
    }
  }

  allTeams = allTeams.map(t => t.id === id ? { ...t, status } : t);
  updateStats();
  renderTab();
}

async function deleteTeam(id, name) {
  if (!confirm(`「${name}」を削除しますか？この操作は元に戻せません。`)) return;
  const { error } = await db.from('teams').delete().eq('id', id);
  if (error) { alert('削除に失敗しました。'); return; }
  allTeams = allTeams.filter(t => t.id !== id);
  updateStats();
  renderTab();
}

// ===== EDIT MODAL =====
function openEditModal(id) {
  const t = allTeams.find(t => t.id === id);
  if (!t) return;
  document.getElementById('editId').value = t.id;
  document.getElementById('editName').value = t.name;
  document.getElementById('editSport').value = t.sport;
  document.getElementById('editPref').value = t.pref;

  // 市区町村を都道府県に合わせて初期化
  const citySelect = document.getElementById('editCity');
  const cities = CITIES[t.pref] || [];
  citySelect.innerHTML = cities.length
    ? '<option value="">選択してください</option>' + cities.map(c => `<option>${c}</option>`).join('')
    : '<option value="">選択してください</option>';
  citySelect.value = t.city;
  document.getElementById('editFeeNum').value = t.fee_num;
  document.getElementById('editTrial').value = String(t.trial);
  document.getElementById('editInstagram').value = t.instagram || '';
  document.getElementById('editTwitter').value = t.twitter || '';
  document.getElementById('editWebsiteUrl').value = t.website_url || '';
  document.getElementById('editLineUrl').value = t.line_url || '';
  document.getElementById('editEmail').value = t.email || '';
  document.getElementById('editDescription').value = t.description || '';
  document.getElementById('editAddress').value = t.address || '';

  document.querySelectorAll('input[name="editAge"]').forEach(cb => {
    cb.checked = (t.age_groups || []).includes(cb.value);
  });
  const hasPreschool = (t.age_groups || []).includes('未就学');
  document.getElementById('editAgeMinWrap').style.display = hasPreschool ? 'block' : 'none';
  document.querySelectorAll('input[name="editAgeMin"]').forEach(r => {
    r.checked = r.value === t.age_min;
  });
  document.querySelectorAll('input[name="editFeature"]').forEach(cb => {
    if (cb.value === 'female_instructor') cb.checked = !!t.female_instructor;
    if (cb.value === 'girls_welcome') cb.checked = !!t.girls_welcome;
  });
  document.querySelectorAll('input[name="editDay"]').forEach(cb => {
    cb.checked = (t.days || []).includes(cb.value);
  });

  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const feeNum = parseInt(document.getElementById('editFeeNum').value) || 0;
  const ages = [...document.querySelectorAll('input[name="editAge"]:checked')].map(el => el.value);
  const days = [...document.querySelectorAll('input[name="editDay"]:checked')].map(el => el.value);
  const ageMin = document.querySelector('input[name="editAgeMin"]:checked')?.value || null;
  const features = [...document.querySelectorAll('input[name="editFeature"]:checked')].map(el => el.value);

  const updates = {
    name: document.getElementById('editName').value.trim(),
    sport: document.getElementById('editSport').value,
    pref: document.getElementById('editPref').value,
    city: document.getElementById('editCity').value.trim(),
    fee_num: feeNum,
    fee: `月${feeNum.toLocaleString()}円`,
    trial: document.getElementById('editTrial').value === 'true',
    age_groups: ages,
    age_min: ageMin,
    female_instructor: features.includes('female_instructor'),
    girls_welcome: features.includes('girls_welcome'),
    days: days,
    instagram: document.getElementById('editInstagram').value.trim().replace(/^@/, '') || null,
    twitter: document.getElementById('editTwitter').value.trim().replace(/^@/, '') || null,
    website_url: document.getElementById('editWebsiteUrl').value.trim() || null,
    line_url: document.getElementById('editLineUrl').value.trim() || null,
    email: document.getElementById('editEmail').value.trim() || null,
    description: document.getElementById('editDescription').value.trim() || null,
    address: document.getElementById('editAddress').value.trim() || null,
  };

  const { error } = await db.from('teams').update(updates).eq('id', id);
  if (error) { alert('保存に失敗しました。'); return; }

  allTeams = allTeams.map(t => t.id === id ? { ...t, ...updates } : t);
  closeEditModal();
  renderTab();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('editModal')) closeEditModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });

// 未就学チェック時にage_min表示切り替え
document.getElementById('editAgePreschool').addEventListener('change', function() {
  const wrap = document.getElementById('editAgeMinWrap');
  wrap.style.display = this.checked ? 'block' : 'none';
  if (!this.checked) document.querySelectorAll('input[name="editAgeMin"]').forEach(r => r.checked = false);
});

// 編集モーダル内の都道府県→市区町村連動
document.getElementById('editPref').addEventListener('change', function() {
  const citySelect = document.getElementById('editCity');
  const cities = CITIES[this.value] || [];
  citySelect.innerHTML = cities.length
    ? '<option value="">選択してください</option>' + cities.map(c => `<option>${c}</option>`).join('')
    : '<option value="">選択してください</option>';
});

// Enter key for login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') login();
});
</script>
